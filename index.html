<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro-Audio 3D Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; font-family: 'Inter', sans-serif; }
        #info-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0; pointer-events: none; }
        #info-card.active { opacity: 1; transform: translateY(-20px); }
    </style>
</head>
<body>
    <div id="info-card" class="fixed bottom-10 left-1/2 -translate-x-1/2 w-80 p-6 rounded-2xl border border-white/10 bg-black/60 backdrop-blur-md text-white z-10">
        <h2 id="part-name" class="text-xl font-bold mb-2 tracking-tight">Component</h2>
        <p id="part-desc" class="text-sm text-gray-300 leading-relaxed">Select a part to explore the engineering within.</p>
        <div id="accent-bar" class="h-1 w-12 mt-4 rounded-full bg-blue-500"></div>
    </div>

    <div id="container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
